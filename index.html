<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Avenmark Digital</title>

    <!-- Google Font Fallback -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: "Lovelo";
            src: url("Lovelo.otf") format("opentype");
            font-weight: 700;
        }
    </style>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===========================
         HEADER
    ============================ -->

    <header class="main-header">

        <div class="header-left">

            <img src="IMG_4332.jpeg"
                 class="header-logo"
                 alt="Avenmark Logo">

            <div class="title-block">

                <div class="name fit-text">
                    ETHAN MCCAFFREY
                </div>

                <div class="slogan fit-text">
                    MAKING MIDLANDS MORE
                </div>

            </div>

        </div>

        <nav class="header-right">

            <a class="nav-item fit-text" href="#">
                ABOUT
            </a>

            <a class="nav-item fit-text" href="#">
                ACHIEVEMENTS
            </a>

            <a class="nav-item fit-text message-item" href="#">
                ETHAN'S MESSAGE
            </a>

        </nav>

    </header>

    <!-- ===========================
         PAGE CONTENT
         (Temporary Placeholder)
    ============================ -->

    <main>

        <!--
            Future sections:

            Hero
            About
            Achievements
            Ethan's Message
            Contact

            Footer stays at the bottom.
        -->

    </main>

    <!-- ===========================
         FOOTER
    ============================ -->

    <footer class="main-footer">

        <!-- Brand -->

        <div class="footer-name">
            ETHAN MCCAFFREY
        </div>

        <div class="footer-tagline">
            MAKING MIDLANDS MORE
        </div>

        <!-- Attribution -->

        <a class="footer-owner"
           href="#"
           aria-label="Avenmark Digital">

            Made by Ethan McCaffrey at Avenmark Digital

        </a>

        <!-- Weather -->

        <div class="footer-weather-line">

            <span>Clemson, SC</span>

            <span class="footer-divider">•</span>

            <span id="weather">
                Loading weather...
            </span>

        </div>

        <!-- Live Time -->

        <div
            id="datetime"
            class="footer-time">

            Loading date...

        </div>

        <!-- Copyright -->

        <div class="footer-copyright">

            <span>
                © <span id="year">2026</span>
            </span>

            <span class="footer-divider">•</span>

            <a href="#">
                Avenmark Digital Development
            </a>

        </div>

    </footer>

    <script src="script.js"></script>

</body>

</html>
