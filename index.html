<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avenmark Prototype</title>

<style>
    body {
        margin: 0;
        font-family: Inter, sans-serif;
        background: #0f0f0f;
        color: white;
        overflow-x: hidden;
    }

    /* Smooth transitions */
    .zone {
        height: 100vh;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        transition: opacity 0.6s ease, transform 0.6s ease;
    }

    /* HERO */
    #hero {
        text-align: center;
    }

    .title {
        font-size: 64px;
        font-weight: 900;
        letter-spacing: 2px;
        margin-bottom: 20px;
    }

    .choice-buttons {
        margin-top: 40px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .choice-buttons button {
        padding: 14px 28px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background: rgba(255,255,255,0.1);
        color: white;
        backdrop-filter: blur(10px);
        cursor: pointer;
        transition: 0.3s;
    }

    .choice-buttons button:hover {
        background: rgba(255,255,255,0.2);
    }

    /* GALLERY */
    #gallery {
        opacity: 0;
        transform: translateY(40px);
        pointer-events: none;
    }

    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 40px;
    }

    .card {
        background: rgba(255,255,255,0.08);
        padding: 20px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        backdrop-filter: blur(8px);
    }

    .card:hover {
        background: rgba(255,255,255,0.15);
    }

    /* OVERLAY PANEL */
    #overlay {
        position: fixed;
        top: 0;
        right: -400px;
        width: 350px;
        height: 100vh;
        background: rgba(20,20,20,0.95);
        backdrop-filter: blur(12px);
        padding: 30px;
        transition: 0.5s ease;
        border-left: 1px solid rgba(255,255,255,0.1);
    }

    /* HIDDEN ROOM */
    #hiddenRoom {
        position: fixed;
        bottom: -60%;
        left: 0;
        width: 100%;
        height: 60%;
        background: rgba(0,0,0,0.9);
        backdrop-filter: blur(14px);
        padding: 40px;
        transition: 0.6s ease;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    #secretTrigger {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 18px;
        height: 18px;
        background: rgba(255,255,255,0.15);
        border-radius: 50%;
        cursor: pointer;
    }
</style>
</head>

<body>

<!-- HERO ZONE -->
<section id="hero" class="zone">
    <div class="title">Avenmark Studio</div>
    <p>Where ideas live.</p>

    <div class="choice-buttons">
        <button onclick="showGallery()">See Work</button>
        <button onclick="alert('Identity zone placeholder')">Who I Am</button>
    </div>
</section>

<!-- GALLERY ZONE -->
<section id="gallery" class="zone">
    <h2>Gallery</h2>

    <div class="gallery-grid">
        <div class="card" onclick="openOverlay('Project One')">Project One</div>
        <div class="card" onclick="openOverlay('Project Two')">Project Two</div>
        <div class="card" onclick="openOverlay('Project Three')">Project Three</div>
    </div>
</section>

<!-- SIDE OVERLAY -->
<div id="overlay">
    <h3 id="overlayTitle">Title</h3>
    <p>Generic description text goes here.</p>
</div>

<!-- HIDDEN ROOM -->
<div id="hiddenRoom">
    <h2>Developer Room</h2>
    <p>Private tools, notes, and experiments.</p>
</div>

<!-- SECRET TRIGGER -->
<div id="secretTrigger" onclick="toggleHiddenRoom()"></div>

<script>
function showGallery() {
    const gallery = document.getElementById("gallery");
    gallery.style.opacity = "1";
    gallery.style.transform = "translateY(0)";
    gallery.style.pointerEvents = "auto";

    window.scrollTo({ top: gallery.offsetTop, behavior: "smooth" });
}

function openOverlay(title) {
    document.getElementById("overlayTitle").innerText = title;
    document.getElementById("overlay").style.right = "0";
}

function toggleHiddenRoom() {
    const room = document.getElementById("hiddenRoom");
    room.style.bottom = room.style.bottom === "0px" ? "-60%" : "0px";
}
</script>

</body>
</html>
